<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베네픽 v2.0 — 로그인</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* ── 전체 레이아웃 ── */
.auth-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #fff;
  padding: 40px 16px 60px;
}

/* ── 로고 ── */
.auth-logo-wrap {
  margin-bottom: 36px;
  text-align: center;
}

.auth-logo-link {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  transition: opacity 0.15s;
}
.auth-logo-link:hover { opacity: 0.82; }

.auth-logo-mark {
  width: 50px;
  height: 50px;
  background: linear-gradient(135deg, #4A90E2, #2ECC71);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 24px;
  font-weight: 800;
  color: #fff;
  box-shadow: 0 4px 14px rgba(74,144,226,0.35);
}

.auth-logo-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 36px;
  font-weight: 800;
  color: #4A90E2;
  letter-spacing: -1.5px;
}

/* ── 메인 카드 ── */
.auth-card {
  width: 100%;
  max-width: 500px;
  background: #fff;
  border: 1px solid #dadada;
  border-radius: 6px;
  padding: 28px 24px 24px;
}

/* ── 입력 그룹 ── */
.auth-input-group {
  border: 1.5px solid #dadada;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 12px;
  transition: border-color 0.15s;
}
.auth-input-group:focus-within { border-color: #4A90E2; }

.auth-input {
  display: block;
  width: 100%;
  border: none;
  border-bottom: 1px solid #efefef;
  padding: 15px 16px;
  font-size: 15px;
  font-family: 'Pretendard', sans-serif;
  color: #222;
  outline: none;
  background: #fff;
  transition: background 0.15s;
}
.auth-input:last-child { border-bottom: none; }
.auth-input:focus { background: #f5faff; }
.auth-input::placeholder { color: #bbb; }

/* ── 에러 ── */
.global-error {
  display: none;
  font-size: 12px;
  color: #e74c3c;
  font-weight: 600;
  margin-bottom: 10px;
  padding-left: 2px;
}
.global-error.visible { display: block; }

/* ── 옵션 행 ── */
.auth-options {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.remember-check {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  font-size: 13px;
  color: #555;
  user-select: none;
}
.remember-check input { display: none; }

.check-circle {
  width: 19px;
  height: 19px;
  border: 1.5px solid #ccc;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: transparent;
  transition: all 0.15s;
  font-weight: 700;
}

.ip-security {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  color: #555;
}

/* 토글 */
.toggle {
  position: relative;
  width: 46px;
  height: 24px;
  cursor: pointer;
  flex-shrink: 0;
}
.toggle input { display: none; }
.toggle-track {
  position: absolute;
  inset: 0;
  background: #bbb;
  border-radius: 12px;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  padding: 3px;
  justify-content: flex-start;
}
.toggle input:checked + .toggle-track { background: #4A90E2; justify-content: flex-end; }
.toggle-knob {
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 1px 3px rgba(0,0,0,.3);
  flex-shrink: 0;
}
.toggle-label { font-size: 11px; font-weight: 700; color: #888; min-width: 22px; }

/* ── 로그인 버튼 ── */
.btn-login {
  width: 100%;
  padding: 15px;
  background: #bbb;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 17px;
  font-weight: 700;
  font-family: 'Pretendard', sans-serif;
  cursor: pointer;
  transition: background 0.18s;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-login.ready { background: #4A90E2; cursor: pointer; }
.btn-login.ready:hover { background: #2B6CB0; }
.btn-login .spinner {
  display: none;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
.btn-login.loading .spinner { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SNS ── */
.sns-row { display: flex; gap: 8px; }
.btn-sns {
  flex: 1;
  padding: 11px 8px;
  border: 1.5px solid #e0e0e0;
  border-radius: 4px;
  background: #fff;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Pretendard', sans-serif;
  color: #555;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: all 0.15s;
}
.btn-sns.kakao { background: #FEE500; border-color: #FEE500; color: #3A1D1D; }
.btn-sns.kakao:hover { background: #f5dc00; }
.btn-sns:not(.kakao):hover { background: #f8f8f8; }

/* ── 하단 링크 ── */
.auth-footer {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 18px;
}
.auth-footer a {
  font-size: 13px;
  color: #666;
  text-decoration: none;
  padding: 0 14px;
  border-right: 1px solid #ddd;
}
.auth-footer a:last-child { border-right: none; }
.auth-footer a:hover { color: #4A90E2; text-decoration: underline; }

/* ── 반응형 ── */
@media (max-width: 540px) {
  .auth-card { border: none; padding: 20px 0; }
  .auth-logo-name { font-size: 28px; }
}
</style>
</head>
<body>

<div class="auth-page">

  <!-- 로고 -->
  <div class="auth-logo-wrap">
    <a href="index.html" class="auth-logo-link">
      <div class="auth-logo-mark">B</div>
      <span class="auth-logo-name">베네픽</span>
    </a>
  </div>

  <!-- 카드 -->
  <div class="auth-card">

    <!-- ── ID 로그인 패널 ── -->
    <div id="panel-id">

      <div class="global-error" id="globalError"></div>

      <div class="auth-input-group">
        <input class="auth-input" type="email" id="loginEmail" placeholder="아이디 또는 이메일" autocomplete="email">
        <input class="auth-input" type="password" id="loginPw" placeholder="비밀번호" autocomplete="current-password">
      </div>

      <div class="auth-options">
        <label class="remember-check">
          <input type="checkbox" id="rememberMe">
          <div class="check-circle" id="rememberBox">✓</div>
          로그인 상태 유지
        </label>
        <div class="ip-security">
          IP보안
          <label class="toggle">
            <input type="checkbox" id="ipToggle">
            <div class="toggle-track"><div class="toggle-knob"></div></div>
          </label>
          <span class="toggle-label" id="ipLabel">OFF</span>
        </div>
      </div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <div class="spinner"></div>
        <span class="btn-text">로그인</span>
      </button>

      <div class="sns-row">
        <button class="btn-sns kakao" onclick="snsLogin('kakao')">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#3A1D1D" d="M12 3C7.03 3 3 6.14 3 10c0 2.5 1.6 4.7 4 5.96l-.98 3.64L10.4 17c.52.07 1.05.1 1.6.1 4.97 0 9-3.14 9-7S16.97 3 12 3z"/></svg>
          카카오 로그인
        </button>
        <button class="btn-sns" onclick="snsLogin('google')">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/></svg>
          구글 로그인
        </button>
      </div>
    </div>

  </div>

  <!-- 하단 링크 -->
  <div class="auth-footer">
    <a href="#">비밀번호 찾기</a>
    <a href="#">아이디 찾기</a>
    <a href="signup.html">회원가입</a>
  </div>

</div>

<script src="i18n.js" onerror="void 0"></script>
<script>
/* ── 로그인 버튼 활성화 ── */
function checkReady() {
  const e = document.getElementById('loginEmail').value.trim();
  const p = document.getElementById('loginPw').value;
  document.getElementById('loginBtn').classList.toggle('ready', e.length > 0 && p.length > 0);
}
document.getElementById('loginEmail').addEventListener('input', checkReady);
document.getElementById('loginPw').addEventListener('input', checkReady);

/* ── IP보안 토글 ── */
document.getElementById('ipToggle').addEventListener('change', function() {
  document.getElementById('ipLabel').textContent = this.checked ? 'ON' : 'OFF';
});

/* ── 로그인 상태 유지 ── */
document.getElementById('rememberMe').addEventListener('change', function() {
  const box = document.getElementById('rememberBox');
  box.style.color = this.checked ? '#4A90E2' : 'transparent';
  box.style.borderColor = this.checked ? '#4A90E2' : '#ccc';
});

/* ── Enter 키 ── */
document.querySelectorAll('.auth-input').forEach(inp => {
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
});

/* ── 로그인 처리 ── */
function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPw').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('globalError');

  // 1. 초기화 및 로딩 시작
  err.classList.remove('visible');
  btn.classList.add('loading');
  btn.disabled = true;

  // 2. 가짜 지연 시간 (0.5초 후 검증)
  setTimeout(() => {
    if (email === '1' && pw === '1') {
      // 로그인 성공
      localStorage.setItem('token', 'temp-token-1111');
      localStorage.setItem('benefic_user', JSON.stringify({ name: '테스트 유저', email: 'test@example.com', initial: 'T' }));
      window.location.href = 'index.html';
    } else {
      // 로그인 실패
      err.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
      err.classList.add('visible');

      // 버튼 상태 원복
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }, 500);
}

function snsLogin(p) {
  alert({ kakao: '카카오', google: '구글' }[p] + ' 로그인은 데모에서 지원되지 않습니다.');
}
</script>
</body>
</html>
